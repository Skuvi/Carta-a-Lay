<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para vos</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&family=Lora:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
</head>
<body>
    <div class="contenedor">
        <div class="carta">
            <h1 class="saludo">Mi amor,</h1>
            
            <p class="mensaje">
                Acá podés escribir todo tu mensaje. Podés explayarte todo lo que quieras. 
                El diseño está pensado para que se lea cómodamente, como si fuera una carta de papel de verdad.
            </p>
            <p class="mensaje">
                Incluso podés separar en distintos párrafos usando esta misma etiqueta "p".
            </p>

            <p class="firma">
                Con todo mi amor,<br>
                [Tu Nombre]
            </p>
        </div>
    </div>
</body>
</html>
