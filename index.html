<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Querida Lay...</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Playfair+Display:wght@500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div id="pantalla-inicio" class="pantalla-inicio">
        <button id="boton-abrir" class="boton-abrir">Toca para abrir tu carta 💌</button>
    </div>

    <div class="lienzo">
        
        <img src="img/Flor Blanca.png" class="flor flor-blanca" alt="Flor Blanca">
        <img src="img/Flor Rosa.png" class="flor flor-rosa" alt="Flor Rosa">
        <img src="img/Flor amarilla.png" class="flor flor-amarilla" alt="Flor Amarilla">

        <main>
            <div class="composicion-carta">
                <img src="img/SobreRojo.png" class="imagen-sobre" alt="Sobre Rojo">
                
                <div class="nota-papel">
                    <p class="mensaje">
                        Algo de demora, pero lo bueno se hace esperar... <br><br>
                        Acaso solo te doy risa, pensaba yo que habia algo más..<br>
                        Bajisima la vara para dedicarme un tiktok, a mi solo me llamaste la atención.<br>
                        Si tan bien te hice sentir, imaginate cuando nos veamos de vuelta...
                    </p>

                    <div class="pie-firma">
                        <span class="firma">-Tobi</span>
                        <span class="telefono">11 4🤍31-1515</span>
                    </div>
                </div>
            </div>
            
            <a href="URL_DE_TU_WORDLE" class="boton-siguiente">
                Acá si te pinta un Wordle
            </a>
        </main>
        
        <footer style="display: none;">
            <audio id="reproductor-audio" loop>
                <source src="img/Temafinal.mp3" type="audio/mpeg">
            </audio>
        </footer>
    </div>

    <script>
        document.getElementById('boton-abrir').addEventListener('click', function() {
            document.getElementById('reproductor-audio').play();
            
            let pantalla = document.getElementById('pantalla-inicio');
            pantalla.style.opacity = '0';
            setTimeout(function() {
                pantalla.style.display = 'none';
            }, 500); 
        });
    </script>
</body>
</html>
